{{- $icp := site.Params.icp -}}
{{- $baseURL := lower site.BaseURL -}}
{{- $showICP := and $icp $icp.number (in $baseURL "rqbaby.cloud") -}}
{{- if $showICP -}}
<div class="footer">
  <span>
    <a href="{{ $icp.link | default "https://beian.miit.gov.cn/" }}" rel="noopener noreferrer" target="_blank">{{ $icp.number }}</a>
  </span>
</div>
{{- end -}}
